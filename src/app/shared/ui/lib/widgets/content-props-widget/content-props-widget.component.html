<div class="space-y-2">
  <ng0-widget-row label="Padding">
    <ng0-widget-select [options]="paddingOptions" [value]="padding()" (valueChange)="changed.emit({ padding: $event })" />
  </ng0-widget-row>
  <ng0-widget-row label="Fullscreen">
    <ng0-widget-button-group [options]="fullscreenOptions" [value]="fullscreen() + ''" (valueChange)="changed.emit({ fullscreen: $event === 'true' })" />
  </ng0-widget-row>
  <ng0-widget-row label="Overflow">
    <ng0-widget-button-group [options]="boolOptions" [value]="overflow() === 'visible' ? 'true' : 'false'" (valueChange)="changed.emit({ overflow: $event === 'true' ? 'visible' : 'hidden' })" />
  </ng0-widget-row>
</div>
