<div class="space-y-2">
  <ng0-widget-row label="Source" layout="stacked">
    <ng0-widget-text type="url" placeholder="https://..." [value]="src()" (valueChange)="changed.emit({ src: $event })" />
  </ng0-widget-row>
  <ng0-widget-row label="Alt">
    <ng0-widget-text [value]="alt()" (valueChange)="changed.emit({ alt: $event })" />
  </ng0-widget-row>
  <ng0-widget-row label="Fit">
    <ng0-widget-select [options]="fitOptions" [value]="objectFit()" (valueChange)="changed.emit({ objectFit: $event })" />
  </ng0-widget-row>
</div>
