<div class="space-y-2">
  <ng0-widget-row label="Message" layout="stacked">
    <ng0-widget-textarea [value]="content()" [rows]="2" (valueChange)="changed.emit({ content: $event })" />
  </ng0-widget-row>
  <ng0-widget-row label="Variant">
    <ng0-widget-select [options]="variantOptions" [value]="variant()" (valueChange)="changed.emit({ variant: $event })" />
  </ng0-widget-row>
</div>
