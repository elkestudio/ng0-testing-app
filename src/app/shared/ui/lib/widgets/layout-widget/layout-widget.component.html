<div class="space-y-2">
  <!-- Direction + Wrap -->
  <div class="flex items-center gap-1">
    <!-- Direction toggle -->
    <div class="flex gap-0.5 bg-base-200/50 rounded-md p-0.5">
      <button
        class="w-7 h-7 flex items-center justify-center rounded transition-colors"
        [class]="flexDirection() === 'column' ? 'bg-base-100 text-primary shadow-sm' : 'text-base-content/40 hover:text-base-content/60'"
        (click)="setDirection('column')"
        title="Vertical"
      >
        <span class="material-symbols-outlined text-sm">view_agenda</span>
      </button>
      <button
        class="w-7 h-7 flex items-center justify-center rounded transition-colors"
        [class]="flexDirection() === 'row' ? 'bg-base-100 text-primary shadow-sm' : 'text-base-content/40 hover:text-base-content/60'"
        (click)="setDirection('row')"
        title="Horizontal"
      >
        <span class="material-symbols-outlined text-sm">view_column</span>
      </button>
    </div>

    <div class="w-px h-5 bg-base-border/30 mx-0.5"></div>

    <!-- Wrap toggle -->
    <div class="flex gap-0.5 bg-base-200/50 rounded-md p-0.5">
      <button
        class="w-7 h-7 flex items-center justify-center rounded transition-colors"
        [class]="flexWrap() === 'nowrap' ? 'bg-base-100 text-primary shadow-sm' : 'text-base-content/40 hover:text-base-content/60'"
        (click)="setWrap('nowrap')"
        title="No wrap"
      >
        <span class="material-symbols-outlined text-sm">close_fullscreen</span>
      </button>
      <button
        class="w-7 h-7 flex items-center justify-center rounded transition-colors"
        [class]="flexWrap() === 'wrap' ? 'bg-base-100 text-primary shadow-sm' : 'text-base-content/40 hover:text-base-content/60'"
        (click)="setWrap('wrap')"
        title="Wrap"
      >
        <span class="material-symbols-outlined text-sm">open_in_full</span>
      </button>
    </div>
  </div>

  <!-- Justify Content (main axis) -->
  <div class="space-y-0.5">
    <label class="text-[9px] text-base-content/40 uppercase tracking-wider">
      {{ isRow() ? 'Horizontal' : 'Vertical' }} distribution
    </label>
    <div class="flex gap-0.5 bg-base-200/50 rounded-md p-0.5">
      @for (btn of justifyButtons(); track btn.value) {
        <button
          class="w-7 h-7 flex items-center justify-center rounded transition-colors"
          [class]="justifyContent() === btn.value ? 'bg-base-100 text-primary shadow-sm' : 'text-base-content/40 hover:text-base-content/60'"
          (click)="setJustify(btn.value)"
          [title]="btn.label"
        >
          <span class="material-symbols-outlined text-sm">{{ btn.icon }}</span>
        </button>
      }
    </div>
  </div>

  <!-- Align Items (cross axis) -->
  <div class="space-y-0.5">
    <label class="text-[9px] text-base-content/40 uppercase tracking-wider">
      {{ isRow() ? 'Vertical' : 'Horizontal' }} align
    </label>
    <div class="flex gap-0.5 bg-base-200/50 rounded-md p-0.5">
      @for (btn of alignButtons(); track btn.value) {
        <button
          class="w-7 h-7 flex items-center justify-center rounded transition-colors"
          [class]="alignItems() === btn.value ? 'bg-base-100 text-primary shadow-sm' : 'text-base-content/40 hover:text-base-content/60'"
          (click)="setAlign(btn.value)"
          [title]="btn.label"
        >
          <span class="material-symbols-outlined text-sm">{{ btn.icon }}</span>
        </button>
      }
    </div>
  </div>

  <!-- Gap -->
  <div class="flex items-center border border-base-border rounded bg-base-100 focus-within:ring-1 focus-within:ring-primary overflow-hidden">
    <span class="text-[9px] font-bold text-base-content/40 pl-1.5 shrink-0">Gap</span>
    <input
      type="text"
      [ngModel]="gap()"
      (ngModelChange)="setGap($event)"
      placeholder="0"
      class="flex-1 min-w-0 px-1 py-0.5 text-[10px] bg-transparent text-base-content outline-none"
    />
  </div>
</div>
