<div class="space-y-2">
  <!-- Interactive border diagram — drag a corner dot to set its radius -->
  <div class="relative h-24 flex items-center justify-center">
    <!-- Only 2 locks: top + right (sides linking / corners linking) -->
    <button type="button"
      class="absolute left-1/2 -translate-x-1/2 top-0 w-4 h-4 flex items-center justify-center transition-colors"
      [class]="linked() ? 'text-base-content/80' : 'text-base-content/40 hover:text-base-content/70'"
      (click)="toggleLinked()"
      [title]="linked() ? 'Sides linked' : 'Sides unlinked'"
    >
      <span class="material-symbols-outlined text-[13px]">{{ linked() ? 'lock' : 'lock_open' }}</span>
    </button>
    <button type="button"
      class="absolute top-1/2 -translate-y-1/2 right-0 w-4 h-4 flex items-center justify-center transition-colors"
      [class]="cornersLinked() ? 'text-base-content/80' : 'text-base-content/40 hover:text-base-content/70'"
      (click)="toggleCornersLinked()"
      [title]="cornersLinked() ? 'Corners linked' : 'Corners unlinked'"
    >
      <span class="material-symbols-outlined text-[13px]">{{ cornersLinked() ? 'lock' : 'lock_open' }}</span>
    </button>

    <!-- Rectangle preview + draggable corner dots -->
    <div class="relative w-36 h-16"
      [style.border]="'2px ' + (borderStyle() === 'none' ? 'solid' : borderStyle()) + ' currentColor'"
      [style.borderRadius]="borderRadius() || '8px'"
    >
      @for (c of corners; track c.id) {
        <div
          class="absolute w-2.5 h-2.5 rounded-full bg-base-content cursor-ns-resize transition-transform hover:scale-125"
          [class.ring-2]="activeCorner() === c.id"
          [class.ring-primary]="activeCorner() === c.id"
          [class.-top-1.25]="c.id === 'tl' || c.id === 'tr'"
          [class.-bottom-1.25]="c.id === 'bl' || c.id === 'br'"
          [class.-left-1.25]="c.id === 'tl' || c.id === 'bl'"
          [class.-right-1.25]="c.id === 'tr' || c.id === 'br'"
          (pointerdown)="onCornerPointerDown($event, c.id)"
          [title]="c.label + ' — drag vertically to set radius'"
        ></div>
      }
    </div>
  </div>

  <!-- Editing target + All -->
  <div class="flex items-center justify-between text-[9px] uppercase tracking-wider">
    <span class="text-base-content/40">Editing: <span class="text-primary font-semibold">{{ activeLabel() }}</span></span>
    <button type="button" class="text-base-content/40 hover:text-primary transition-colors" (click)="resetActive()">All</button>
  </div>

  <!-- Style selector + width/color/radius inputs -->
  <div class="flex gap-0.5 bg-base-200/50 rounded-md p-0.5">
    @for (btn of borderStyleButtons; track btn.value) {
      <button type="button"
        class="flex-1 h-6 flex items-center justify-center rounded transition-colors"
        [class]="borderStyle() === btn.value ? 'bg-base-100 text-primary shadow-sm' : 'text-base-content/40 hover:text-base-content/60'"
        (click)="setBorderStyle(btn.value)"
        [title]="btn.label"
      >
        <span class="material-symbols-outlined text-[12px]">{{ btn.icon }}</span>
      </button>
    }
  </div>
  <div class="grid grid-cols-3 gap-1">
    <input
      type="text"
      [ngModel]="borderWidth()"
      (ngModelChange)="onBorderWidthChange($event)"
      placeholder="width"
      class="border border-base-border rounded px-1 py-0.5 text-[10px] bg-base-100 text-base-content outline-none focus:ring-1 focus:ring-primary"
    />
    <input
      type="text"
      [ngModel]="borderColor()"
      (ngModelChange)="onBorderColorChange($event)"
      placeholder="color"
      class="border border-base-border rounded px-1 py-0.5 text-[10px] bg-base-100 text-base-content outline-none focus:ring-1 focus:ring-primary"
    />
    <input
      type="text"
      [ngModel]="borderRadius()"
      (ngModelChange)="onBorderRadiusChange($event)"
      placeholder="radius"
      class="border border-base-border rounded px-1 py-0.5 text-[10px] bg-base-100 text-base-content outline-none focus:ring-1 focus:ring-primary"
    />
  </div>

  <!-- Outline -->
  <div class="space-y-1 pt-2 border-t border-base-border/40">
    <span class="text-[9px] text-base-content/30 font-semibold uppercase tracking-wider">Outline</span>
    <div class="flex gap-0.5 bg-base-200/50 rounded-md p-0.5">
      @for (btn of outlineStyleButtons; track btn.value) {
        <button type="button"
          class="flex-1 h-6 flex items-center justify-center rounded transition-colors"
          [class]="outlineStyle() === btn.value ? 'bg-base-100 text-primary shadow-sm' : 'text-base-content/40 hover:text-base-content/60'"
          (click)="setOutlineStyle(btn.value)"
          [title]="btn.label"
        >
          <span class="material-symbols-outlined text-[12px]">{{ btn.icon }}</span>
        </button>
      }
    </div>
    <div class="grid grid-cols-3 gap-1">
      <input
        type="text"
        [ngModel]="outlineWidth()"
        (ngModelChange)="onOutlineWidthChange($event)"
        placeholder="width"
        class="border border-base-border rounded px-1 py-0.5 text-[10px] bg-base-100 text-base-content outline-none focus:ring-1 focus:ring-primary"
      />
      <input
        type="text"
        [ngModel]="outlineColor()"
        (ngModelChange)="onOutlineColorChange($event)"
        placeholder="color"
        class="border border-base-border rounded px-1 py-0.5 text-[10px] bg-base-100 text-base-content outline-none focus:ring-1 focus:ring-primary"
      />
      <input
        type="text"
        [ngModel]="outlineOffset()"
        (ngModelChange)="onOutlineOffsetChange($event)"
        placeholder="offset"
        class="border border-base-border rounded px-1 py-0.5 text-[10px] bg-base-100 text-base-content outline-none focus:ring-1 focus:ring-primary"
      />
    </div>
  </div>
</div>
