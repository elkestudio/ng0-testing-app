<div class="space-y-2">
  <ng0-widget-row label="Position">
    <ng0-widget-button-group [options]="positionOptions" [value]="position()" (valueChange)="changed.emit({ position: $event })" />
  </ng0-widget-row>
  <ng0-widget-row label="Size">
    <ng0-widget-button-group [options]="sizeOptions" [value]="size()" (valueChange)="changed.emit({ size: $event })" />
  </ng0-widget-row>
  <ng0-widget-row label="Fixed">
    <ng0-widget-button-group [options]="boolOptions" [value]="fixed() + ''" (valueChange)="changed.emit({ fixed: $event === 'true' })" />
  </ng0-widget-row>
  <ng0-widget-row label="Floating">
    <ng0-widget-button-group [options]="boolOptions" [value]="floating() + ''" (valueChange)="changed.emit({ floating: $event === 'true' })" />
  </ng0-widget-row>
</div>
