<div class="space-y-2">
  <ng0-widget-row label="Value" layout="stacked">
    <ng0-widget-number [value]="value()" [min]="0" [max]="max()" [showSlider]="true" (valueChange)="changed.emit({ value: $event })" />
  </ng0-widget-row>
  <ng0-widget-row label="Max">
    <ng0-widget-number [value]="max()" [min]="1" [max]="10000" (valueChange)="changed.emit({ max: $event })" />
  </ng0-widget-row>
  <ng0-widget-row label="Color">
    <ng0-widget-select [options]="colorOptions" [value]="color()" (valueChange)="changed.emit({ color: $event })" />
  </ng0-widget-row>
</div>
