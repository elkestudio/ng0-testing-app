<div class="space-y-2">
  <ng0-widget-row label="Placeholder">
    <ng0-widget-text [value]="placeholder()" (valueChange)="changed.emit({ placeholder: $event })" />
  </ng0-widget-row>
  <ng0-widget-row label="Rows">
    <ng0-widget-number [value]="rows()" [min]="1" [max]="20" (valueChange)="changed.emit({ rows: $event })" />
  </ng0-widget-row>
</div>
