<div class="space-y-1">
  <div class="flex items-center gap-2">
    @if (label()) {
      <label class="text-[9px] text-base-content/40 uppercase tracking-wider shrink-0">{{ label() }}</label>
    }
    <input
      type="number"
      class="flex-1 min-w-0 border border-base-border rounded px-1.5 py-1 text-[10px] bg-base-100 text-base-content outline-none focus:ring-1 focus:ring-primary"
      [ngModel]="value()"
      (ngModelChange)="onChange(+$event)"
      [min]="min()"
      [max]="max()"
      [step]="step()"
    />
  </div>
  @if (showSlider()) {
    <input
      type="range"
      class="w-full h-1 accent-primary cursor-pointer"
      [ngModel]="value()"
      (ngModelChange)="onChange(+$event)"
      [min]="min()"
      [max]="max()"
      [step]="step()"
    />
  }
</div>
