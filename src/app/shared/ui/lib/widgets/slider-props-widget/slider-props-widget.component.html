<div class="space-y-2">
  <ng0-widget-row label="Min">
    <ng0-widget-number [value]="min()" [min]="0" [max]="1000" (valueChange)="changed.emit({ min: $event })" />
  </ng0-widget-row>
  <ng0-widget-row label="Max">
    <ng0-widget-number [value]="max()" [min]="1" [max]="10000" (valueChange)="changed.emit({ max: $event })" />
  </ng0-widget-row>
  <ng0-widget-row label="Value" layout="stacked">
    <ng0-widget-number [value]="value()" [min]="min()" [max]="max()" [showSlider]="true" (valueChange)="changed.emit({ value: $event })" />
  </ng0-widget-row>
</div>
