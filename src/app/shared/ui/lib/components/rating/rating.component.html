<div
  [class]="containerClasses()"
  [style.--rating-color]="colorVar()"
  [attr.aria-label]="ariaLabel()"
>
  @if (half()) {
    @for (item of halfItems(); track item.value) {
      <input
        type="radio"
        [name]="uniqueName"
        [class]="getShapeClass(item.isHalf, item.isHalf)"
        [checked]="value() === item.value"
        [disabled]="disabled() || isDisabled()"
        (change)="onRatingChange(item.value)"
      />
    }
  } @else {
    @for (item of items(); track item) {
      <input
        type="radio"
        [name]="uniqueName"
        [class]="getShapeClass()"
        [checked]="value() === item"
        [disabled]="disabled() || isDisabled()"
        (change)="onRatingChange(item)"
      />
    }
  }
</div>
