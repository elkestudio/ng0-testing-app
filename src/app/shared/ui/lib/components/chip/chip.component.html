<span [class]="chipClasses()">
  <ng-content />
  @if (removable()) {
    <button
      (click)="remove()"
      class="inline-flex items-center justify-center rounded-full hover:bg-black/10 transition-colors -mr-0.5"
      aria-label="Remove"
    >
      <ng0-icon name="X" [size]="14" />
    </button>
  }
</span>
