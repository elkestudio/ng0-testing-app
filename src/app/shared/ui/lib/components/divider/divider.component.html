@if (orientation() === 'horizontal') {
  <div
    role="separator"
    aria-orientation="horizontal"
    class="flex items-center w-full"
  >
    <div class="flex-1 h-px bg-base-border"></div>
    @if (label()) {
      <span class="px-3 text-sm text-base-content/60">{{
        label()
      }}</span>
      <div class="flex-1 h-px bg-base-border"></div>
    }
  </div>
} @else {
  <div
    role="separator"
    aria-orientation="vertical"
    class="w-px min-h-[1em] h-full bg-base-border self-stretch"
  ></div>
}
