@if (isOpen()) {
  <div
    class="absolute z-50 min-w-[180px] rounded-lg border border-base-border bg-base-100 shadow-lg py-1"
    (mouseleave)="closeOnLeave() && close()"
  >
    @for (item of items(); track item.id) {
      @if (item.separator) {
        <div class="my-1 h-px bg-base-border"></div>
      } @else {
        <button
          type="button"
          class="flex w-full items-center gap-2 px-3 py-2 text-sm text-base-content hover:bg-base-200 transition-colors text-left"
          [class.opacity-40]="item.disabled"
          [class.cursor-not-allowed]="item.disabled"
          [disabled]="item.disabled"
          (click)="select(item)"
        >
          @if (item.icon) {
            <ng0-icon [name]="item.icon" [size]="16" />
          }
          {{ item.label }}
        </button>
      }
    }
  </div>
}
