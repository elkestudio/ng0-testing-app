<label
  [class]="'flex items-center gap-2 cursor-pointer ' + sizeClass() + (disabled() ? ' opacity-50 cursor-not-allowed' : '')"
  [style.--radio-color]="colorStyle()"
>
  <input
    type="radio"
    [name]="name()"
    [value]="value()"
    [checked]="checked()"
    [disabled]="disabled()"
    (change)="onSelect()"
    class="sr-only"
  />
  <div class="radio-circle" [class.checked]="checked()">
    <div class="radio-dot"></div>
  </div>
  @if (label(); as labelText) {
    <span class="text-sm text-base-content">{{ labelText }}</span>
  }
</label>
