@if (isVisible()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center"
    (keydown.escape)="closeOnEscape() && close()"
  >
    <!-- Backdrop -->
    <div
      class="absolute inset-0 bg-black/50 transition-opacity duration-200"
      [class.opacity-100]="!isClosing()"
      [class.opacity-0]="isClosing()"
      (click)="closeOnBackdrop() && close()"
    ></div>

    <!-- Dialog -->
    <div
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="ariaLabel()"
      [class]="dialogClasses()"
      [style.width]="dialogWidth()"
    >
      @if (showClose()) {
        <button
          type="button"
          class="absolute top-3 right-3 text-base-content/40 hover:text-base-content transition-colors"
          (click)="close()"
          aria-label="Close"
        >
          <ng0-icon name="close" [size]="20" />
        </button>
      }
      <ng-content />
    </div>
  </div>
}
