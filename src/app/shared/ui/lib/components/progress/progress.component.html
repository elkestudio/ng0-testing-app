<div [class]="'w-full rounded-full bg-base-200 overflow-hidden ' + barSizeClasses()">
  <div
    [class]="'h-full rounded-full transition-all duration-300 ' + colorClass()"
    [style.width.%]="percentage()"
  ></div>
</div>
@if (showLabel()) {
  <span class="text-sm text-base-content mt-1">{{ percentage() | number:'1.0-0' }}%</span>
}
