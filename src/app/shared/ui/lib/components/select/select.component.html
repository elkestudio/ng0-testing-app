<div [class]="wrapperClasses()">
  <select
    [disabled]="isDisabled"
    [attr.aria-label]="ariaLabel()"
    (change)="handleChange($event)"
    class="ng0-select-field"
  >
    @if (placeholder()) {
      <option value="" disabled [selected]="!valueModel()">{{ placeholder() }}</option>
    }
    @for (opt of options(); track opt.value) {
      <option [value]="opt.value" [disabled]="opt.disabled" [selected]="opt.value === valueModel()">
        {{ opt.label }}
      </option>
    }
  </select>
</div>
