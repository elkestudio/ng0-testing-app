<div
  class="carousel-wrapper"
  #wrapper
  (touchstart)="onTouchStart($event)"
  (touchmove)="onTouchMove($event)"
  (touchend)="onTouchEnd()"
  (mousedown)="onTouchStart($event)"
  (mousemove)="onTouchMove($event)"
  (mouseup)="onTouchEnd()"
  (mouseleave)="onTouchEnd()"
>
  <ng-content></ng-content>
</div>

@if (opts.navigation) {
  <button
    type="button"
    class="absolute left-2 top-1/2 -translate-y-1/2 p-2 rounded-full bg-black/20 text-white hover:bg-black/40 transition-colors backdrop-blur-sm"
    (click)="prev()"
    aria-label="Previous slide"
  >
    <ng0-icon name="ChevronLeft" [size]="24" />
  </button>
  <button
    type="button"
    class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-full bg-black/20 text-white hover:bg-black/40 transition-colors backdrop-blur-sm"
    (click)="next()"
    aria-label="Next slide"
  >
    <ng0-icon name="ChevronRight" [size]="24" />
  </button>
}

@if (opts.pagination) {
  <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 z-10">
    @for (item of items(); track $index) {
      <button
        type="button"
        class="h-2 rounded-full transition-all duration-300 focus:outline-none"
        [ngClass]="{ 'bg-white': $index === activeIndex(), 'w-4': $index === activeIndex(), 'w-2': $index !== activeIndex(), 'bg-white/50': $index !== activeIndex() }"
        (click)="goTo($index)"
      ></button>
    }
  </div>
}
