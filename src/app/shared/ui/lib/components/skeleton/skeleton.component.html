@if (variant() === 'text') {
  <div class="flex flex-col gap-2">
    @for (line of lineArray(); track line) {
      <div
        [class]="skeletonClasses()"
        [style.width]="line === lineArray().length - 1 ? '75%' : '100%'"
      ></div>
    }
  </div>
} @else {
  <div [class]="skeletonClasses()" [style]="skeletonStyle()"></div>
}
