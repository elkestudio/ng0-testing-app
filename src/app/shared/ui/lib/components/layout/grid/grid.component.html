<div class="relative w-full h-full" [ngStyle]="gridStyle()">
  @if (editing()) {
    @for (cell of cells(); track cell) {
      <div
        class="border border-dashed border-primary/40 bg-primary/5 rounded min-h-10 cursor-pointer hover:bg-primary/10 hover:border-primary/60 transition-colors flex items-center justify-center"
        (click)="cellClick.emit(cell)"
      >
        <span class="text-[9px] font-bold text-primary/30 uppercase tracking-widest select-none">{{ cell + 1 }}</span>
      </div>
    }
  } @else {
    <ng-content />
  }
</div>
