<div class="relative">
  <button
    type="button"
    class="w-full flex items-center justify-between px-4 py-2 border border-base-border rounded-lg bg-base-200 text-left transition-all focus:outline-none focus:ring-2 focus:ring-primary"
    [class.opacity-50]="isDisabled"
    [class.cursor-not-allowed]="isDisabled"
    [attr.aria-label]="'Select date'"
    [attr.aria-expanded]="isOpen()"
    [disabled]="isDisabled"
    (click)="toggleCalendar()"
  >
    <span
      [class.opacity-50]="!selectedDate()"
      [class.text-base-content]="selectedDate()"
    >
      {{ displayValue || placeholder() }}
    </span>
    <ng0-icon name="calendar" [size]="20" class="text-base-content/50" />
  </button>
</div>
