<div class="relative">
  <input
    type="text"
    [value]="query()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled"
    [attr.aria-autocomplete]="'list'"
    [attr.aria-controls]="'ng0-autocomplete-list'"
    class="w-full px-4 py-2 border border-base-border rounded-lg bg-base-100 text-base-content focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
    [class.opacity-50]="isDisabled"
    [class.cursor-not-allowed]="isDisabled"
    (input)="onInput($event)"
    (focus)="onFocus()"
    (keydown)="onKeydown($event)"
    autocomplete="off"
  />
</div>
