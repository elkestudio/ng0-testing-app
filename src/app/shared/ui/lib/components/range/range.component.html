<div class="flex flex-col gap-1 w-full">
  <input
    type="range"
    [class]="rangeClass()"
    [style.--range-color]="colorVar()"
    [min]="min()"
    [max]="max()"
    [step]="step()"
    [value]="value()"
    [disabled]="disabled() || isDisabled()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  @if (showTicks() && tickLabels().length) {
    <div class="flex justify-between text-xs text-base-content/50 px-0.5">
      @for (label of tickLabels(); track label) {
        <span>{{ label }}</span>
      }
    </div>
  }
</div>
