<div class="flex flex-col items-center justify-center text-center py-12 px-4">
  @if (icon(); as iconName) {
    <div class="mb-4 text-base-content/30">
      <ng0-icon [name]="iconName" [size]="48" />
    </div>
  }
  @if (title(); as t) {
    <h3 class="text-lg font-semibold text-base-content mb-1">{{ t }}</h3>
  }
  @if (description(); as desc) {
    <p class="text-sm text-base-content/60 max-w-sm">{{ desc }}</p>
  }
  <div class="mt-4">
    <ng-content />
  </div>
</div>
