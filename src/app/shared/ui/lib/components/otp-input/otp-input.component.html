<div class="flex gap-2 justify-center">
  @for (i of inputsArray(); track i) {
    <input
      #otpInput
      [type]="masked() ? 'password' : 'text'"
      inputmode="numeric"
      autocomplete="one-time-code"
      [name]="'otp-' + i"
      maxlength="1"
      [value]="values()[i]"
      [disabled]="isDisabled"
      class="w-12 h-14 text-center text-xl font-semibold border-2 rounded-lg bg-base-100 text-base-content transition-all focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
      [class.border-base-border]="!values()[i]"
      [class.border-primary]="values()[i]"
      [class.opacity-50]="isDisabled"
      [class.cursor-not-allowed]="isDisabled"
      [attr.aria-label]="'Digit ' + (i + 1)"
      (input)="onInput($event, i)"
      (keydown)="onKeydown($event, i)"
      (paste)="onPaste($event)"
    />
  }
</div>
