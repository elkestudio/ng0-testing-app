@if (overlay.contextMenu(); as menu) {
  <!-- Backdrop: catches any click outside -->
  <div
    class="fixed inset-0 z-[9998]"
    (click)="overlay.closeContextMenu()"
    (contextmenu)="$event.preventDefault(); overlay.closeContextMenu()"
  ></div>

  <!-- Menu panel -->
  <div
    class="fixed z-[9999] bg-base-100 border border-base-border rounded-xl shadow-xl py-1 min-w-40"
    [style.left.px]="menu.x"
    [style.top.px]="menu.y"
    (click)="$event.stopPropagation()"
  >
    @for (item of menu.items; track item.label) {
      <button
        class="w-full text-left px-4 py-2 text-sm transition-colors flex items-center gap-2"
        [ngClass]="{ 'text-error': item.danger, 'text-base-content': !item.danger, 'hover:bg-error/10': item.danger, 'hover:bg-base-200': !item.danger }"
        [class.opacity-40]="item.disabled"
        [class.cursor-not-allowed]="item.disabled"
        [disabled]="item.disabled"
        (click)="item.action(); overlay.closeContextMenu()"
      >
        @if (item.icon) {
          <ng0-icon [name]="item.icon" [size]="14" />
        }
        {{ item.label }}
      </button>
    }
  </div>
}
