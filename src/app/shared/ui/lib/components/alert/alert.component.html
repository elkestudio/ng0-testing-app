@if (visible()) {
  <div
    class="flex items-start gap-3 px-4 py-3 rounded-lg border"
    [class]="variantClasses()"
    role="alert"
  >
    <ng0-icon [name]="iconName()" [size]="20" class="shrink-0 mt-0.5" />
    <div class="flex-1 text-sm">
      <ng-content />
    </div>
    @if (dismissible()) {
      <button
        (click)="dismiss()"
        class="shrink-0 p-1 rounded-full hover:bg-black/10 transition-colors"
        aria-label="Dismiss"
      >
        <ng0-icon name="X" [size]="16" />
      </button>
    }
  </div>
}
