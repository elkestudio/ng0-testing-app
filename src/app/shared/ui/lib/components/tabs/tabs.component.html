<div class="flex border-b border-base-border" role="tablist">
  @for (tab of tabs(); track tab.tabId()) {
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="tab.tabId() === activeTab()"
      [disabled]="tab.disabled()"
      (click)="selectTab(tab.tabId())"
      [class]="tabClasses()(tab.tabId())"
    >
      @if (tab.icon()) {
        <ng0-icon [name]="tab.icon()!" [size]="16" />
      }
      {{ tab.label() }}
    </button>
  }
</div>
<ng-content />
