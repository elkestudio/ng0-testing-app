<div
  class="flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border backdrop-blur-sm transition-all duration-300"
  [class]="variantClasses()"
  [class.translate-x-0]="isVisible()"
  [class.opacity-100]="isVisible()"
  [class.translate-x-full]="!isVisible()"
  [class.opacity-0]="!isVisible()"
  role="alert"
>
  <ng0-icon [name]="iconName()" [size]="20" class="shrink-0" />
  <div class="text-sm font-medium flex-1">{{ message() }}</div>
  <button
    (click)="close()"
    class="ml-auto -mr-1 p-1 rounded-full hover:bg-black/10 transition-colors opacity-60 hover:opacity-100"
    aria-label="Dismiss"
  >
    <ng0-icon name="X" [size]="16" />
  </button>
</div>
