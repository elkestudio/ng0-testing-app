<aside
  class="flex flex-col h-full max-w-full bg-base-100 shadow-2xl"
  [class]="sizeClass + ' ' + cssClass"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="title"
  (click)="$event.stopPropagation()"
>
  @if (title || showClose) {
    <div class="h-14 flex items-center justify-between px-4 border-b border-base-border shrink-0">
      @if (title) {
        <h2 class="text-sm font-semibold text-base-content">{{ title }}</h2>
      }
      @if (showClose) {
        <button
          type="button"
          class="ml-auto p-1.5 rounded-md hover:bg-base-200 transition-colors text-base-content/50 hover:text-base-content"
          aria-label="Close"
          (click)="onCloseClick()"
        >
          <ng0-icon name="close" [size]="18" />
        </button>
      }
    </div>
  }
  <div class="flex-1 overflow-auto">
    <ng-container #contentHost></ng-container>
  </div>
</aside>
