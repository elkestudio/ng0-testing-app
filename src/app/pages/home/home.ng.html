<div class="relative min-h-dvh">
  <ng0-header class="overflow-hidden">
    <ng0-icon name="Menu" library="path"></ng0-icon>
    <ng0-text class="w-fit">Payment</ng0-text>
    <ng0-icon name="notifications_none" library="path"></ng0-icon>
  </ng0-header>
  <ng0-content padding="lg" fullscreen class="bg-transparent" style="background-image:linear-gradient(139deg, #297ea3 0%, #132d57 100%)">
    <div align="start" class="w-full min-w-[2rem] min-h-[2rem] flex flex-row items-start justify-start gap-2 overflow-visible h-full pr-2 pl-2 pb-2 pt-2" style="align-self:stretch;flex-shrink:0">
      <ng0-button>Button</ng0-button>
    </div>
  </ng0-content>
  <ng0-dock position="fixed" class="overflow-hidden border-none border-[#3d6600]" style="outline-style:none">
    <ng0-icon name="Home" library="path"></ng0-icon>
    <ng0-icon name="credit-card" library="path"></ng0-icon>
    <ng0-icon name="Crown" library="path"></ng0-icon>
  </ng0-dock>
</div>
