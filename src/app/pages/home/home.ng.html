<div class="relative min-h-dvh">
  <ng0-header class="overflow-hidden">
    <ng0-icon name="Menu" library="path"></ng0-icon>
    <ng0-text class="w-fit">Payment</ng0-text>
    <ng0-icon name="notifications_none" library="path"></ng0-icon>
  </ng0-header>
  <ng0-content fullscreen class="bg-transparent" style="background-image:linear-gradient(139deg, #297ea3 0%, #132d57 100%)">
    <div align="start" class="w-full min-w-[2rem] min-h-[2rem] flex flex-col items-start justify-start gap-2 overflow-visible h-full pr-2 pl-2 pb-2 pt-2" style="align-self:stretch;flex-shrink:0">
      <div direction="row" justify="between" class="w-full min-w-0 min-h-[2rem] flex flex-row items-stretch justify-between gap-2 overflow-visible">
        <ng0-button btnWidth="1/2">Click me</ng0-button>
        <ng0-button variant="outline" btnWidth="1/2">Don't Click me</ng0-button>
      </div>
      <ng0-input placeholder="Enter text..." variant="filled" size="lg" required class="w-full"></ng0-input>
      <ng0-button iconOnly><ng0-icon name="notifications_none" [size]="16"></ng0-icon></ng0-button>
      <img src="https://usabilitygeek.com/wp-content/uploads/2016/06/product-images-ecommerce-2-360.jpg" alt="Image" class="object-cover w-full h-fit">
      <ng0-rating [value]="3" [max]="5"></ng0-rating>
      <ng0-text variant="h1" fontWeight="bold" textAlign="center" fontStyle="italic" class="w-fit">Caption</ng0-text>
      <ng0-chip variant="outlined" color="primary" removable>Chip</ng0-chip>
    </div>
  </ng0-content>
  <ng0-dock position="fixed" class="overflow-hidden border-none border-[#3d6600]" style="outline-style:none">
    <ng0-button variant="soft" btnWidth="full" iconGap="md" ariaLabel="Click to pay"><ng0-icon name="credit-card" [size]="16"></ng0-icon>Payment</ng0-button>
  </ng0-dock>
</div>
